<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Cotizador de Cuadernos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3">Cotizador de Cuadernos</h1>
      <button id="logoutBtn" class="btn btn-outline-danger">Cerrar sesión</button>
    </div>

    <div id="alertBox"></div>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm p-3">
          <h2 class="h5 mb-3">Nueva cotización</h2>
          <form id="cotizacionForm">
            <div class="mb-3">
              <label class="form-label">Cliente</label>
              <input type="text" id="cliente_nombre" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Producto</label>
              <select id="producto_id" class="form-select" required>
                <option value="">Seleccione un producto</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Cantidad</label>
              <input type="number" id="cantidad" class="form-control" min="1" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Fecha de cotización</label>
              <input type="date" id="fecha_cotizacion" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Precio unitario</label>
              <input type="text" id="precio_unitario" class="form-control" readonly>
            </div>

            <div class="mb-3">
              <label class="form-label">Total estimado</label>
              <input type="text" id="total_estimado" class="form-control" readonly>
            </div>

            <button type="submit" class="btn btn-primary w-100">Guardar cotización</button>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm p-3">
          <div class="d-flex flex-wrap gap-2 justify-content-between align-items-end mb-3">
            <h2 class="h5 mb-0">Listado de cotizaciones</h2>
            <div class="row g-2">
              <div class="col-md-auto">
                <input type="text" id="filtroCliente" class="form-control" placeholder="Buscar por cliente">
              </div>
              <div class="col-md-auto">
                <input type="date" id="filtroFecha" class="form-control">
              </div>
              <div class="col-md-auto">
                <button id="btnBuscar" class="btn btn-secondary">Buscar</button>
              </div>
              <div class="col-md-auto">
                <button id="btnLimpiar" class="btn btn-outline-secondary">Limpiar</button>
              </div>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Cliente</th>
                  <th>Producto</th>
                  <th>Cantidad</th>
                  <th>Precio Unitario</th>
                  <th>Total</th>
                  <th>Fecha</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaCotizaciones">
                <tr>
                  <td colspan="8" class="text-center">Cargando datos...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/dashboard.js"></script>
</body>
</html>
